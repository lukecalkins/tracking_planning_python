---
# Bearing only sensor model
sensorType: bearing
min_range: 0
max_range: 10000
min_hang: -180
max_hang: 180
b_sigma: 0.021  # standard deviation in radians
detection_prob: 0.99
unresolved_resolution: 0.1745  # 0.0873 = 5 degrees, 0.1745 = 10 degrees, 0.2618 = 15 degrees, 0.3491 = 20 degrees
masking_proximity: 10   # relative bearing separationg for target masking to occur